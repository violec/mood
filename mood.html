// entries visible on calendar: have a startDate; range = start → (end | today if active | start)
function calRange(e){
  if (!e.startDate) return null;
  let end = e.endDate;
  if (!end) end = (e.status === 'active') ? todayStr() : e.startDate;
  if (end < e.startDate) end = e.startDate;
  return [e.startDate, end];
}

function renderCalendar(){
  const v = $('#view-calendar');
  const { y, m } = ui.cal;
  const first = new Date(y, m, 1);
  const daysIn = new Date(y, m+1, 0).getDate();
  const lead = (first.getDay() + 6) % 7;           // monday-first
  const weeks = Math.ceil((lead + daysIn) / 7);
  const monthStart = dateStr(new Date(y, m, 1));
  const monthEnd = dateStr(new Date(y, m, daysIn));
  const tStr = todayStr();

  // entries overlapping this month, with month-clamped day spans
  const ents = [];
  db.media.forEach(e => {
    const r = calRange(e); if (!r) return;
    if (r[1] < monthStart || r[0] > monthEnd) return;
    const s = r[0] < monthStart ? 1 : parseDate(r[0]).getDate();
    const en = r[1] > monthEnd ? daysIn : parseDate(r[1]).getDate();
    ents.push({ e, s, en, contStart: r[0] < monthStart, contEnd: r[1] > monthEnd, ongoing: !e.endDate && e.status === 'active' });
  });
  ents.sort((a,b) => (a.s - b.s) || (b.en - b.s) - (a.en - a.s));

  // long-runners (3+ weeks in view, or spanning wall to wall) become slim rails
  // instead of flooding the bar lanes — the legend below carries their names
  ents.forEach(x => { x.thin = (x.en - x.s + 1) >= 21 || (x.contStart && x.contEnd); });
  const packLanes = list => {
    const ends = [];
    list.forEach(x => {
      let lane = ends.findIndex(end => end < x.s);
      if (lane === -1){ lane = ends.length; ends.push(0); }
      ends[lane] = x.en;
      x.lane = lane;
    });
    return ends.length;
  };
  const MAXL = 4;
  const fatL = Math.min(packLanes(ents.filter(x => !x.thin)), MAXL);
  const thinL = packLanes(ents.filter(x => x.thin));
  const weekH = Math.max(88, 30 + fatL * 21 + (thinL ? thinL * 10 + 4 : 0) + 4);

  let weeksHTML = '';
  for (let w = 0; w < weeks; w++){
    let cells = '', bars = '';
    for (let c = 0; c < 7; c++){
      const dnum = w*7 + c - lead + 1;
      const out = dnum < 1 || dnum > daysIn;
      const ds = out ? '' : dateStr(new Date(y, m, dnum));
      cells += `<div class="cal-day ${out?'out':''} ${ds===tStr?'today':''}"><span class="n">${out?'':dnum}</span></div>`;
    }
    const w1 = w*7 - lead + 1, w2 = w*7 - lead + 7;  // day numbers covered by this week row
    const hidden = new Set();
    ents.forEach(x => {
      if (x.en < w1 || x.s > w2) return;
      const a = Math.max(x.s, w1), b = Math.min(x.en, w2);
      const left = ((a - w1) / 7 * 100).toFixed(3);
      const width = ((b - a + 1) / 7 * 100).toFixed(3);
      const tip = `${esc(x.e.title)} — ${fmtNice(x.e.startDate)} → ${x.e.endDate ? fmtNice(x.e.endDate) : 'ongoing'}`;
      if (x.thin){
        bars += `<div class="cal-rail ${x.ongoing ? 'ongoing' : ''}" data-id="${x.e.id}" title="${tip}"
          style="left:calc(${left}% + 2px); width:calc(${width}% - 5px); top:${fatL*21 + 4 + x.lane*10}px; background-color:${x.e.color}"></div>`;
        return;
      }
      if (x.lane >= MAXL){ for (let d = a; d <= b; d++) hidden.add(d); return; }
      const endBit = x.en > w2 ? '' : (x.ongoing ? 'ongoing' : (!x.contEnd ? 'endcap' : ''));
      const caps = `${x.s >= w1 && !x.contStart ? 'startcap' : ''} ${endBit}`;
      const showLabel = (a === x.s) || c0Label(a, w1);
      bars += `<div class="cal-bar ${caps}" data-id="${x.e.id}" title="${tip}"
        style="left:calc(${left}% + 2px); width:calc(${width}% - 5px); top:${x.lane*21}px; background-color:${x.e.color}">
        ${showLabel ? `${TYPES[x.e.type].icon}<span style="overflow:hidden;text-overflow:ellipsis">${esc(x.e.title)}</span>` : ''}
      </div>`;
    });
    if (hidden.size) bars += `<div class="cal-more" style="top:${MAXL*21+2}px; left:4px">+${hidden.size} hidden</div>`;
    weeksHTML += `<div class="cal-week" style="--week-h:${weekH}px">${cells}<div class="cal-bars">${bars}</div></div>`;
  }

  const dows = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  v.innerHTML = `
    ${monthHeadHTML(y, m, 'cal')}
    <div class="panel screws" style="padding:14px">
      <div class="cal-wrap"><div class="cal">
        <div class="cal-dow">${dows.map(d => `<div>${d}</div>`).join('')}</div>
        ${weeksHTML}
      </div></div>
      ${ents.length ? `<div class="cal-legend">${ents.map(x => `
        <span class="lg" data-id="${x.e.id}"><i style="background:${x.e.color}; ${x.thin ? 'height:4px' : ''}"></i>${esc(x.e.title)}${x.ongoing ? ' <span style="color:var(--accent)">→</span>' : ''}</span>`).join('')}</div>`
      : `<div class="empty-state" style="padding:34px 10px"><span class="hand">an empty month — nothing logged with dates here</span></div>`}
    </div>`;
  function c0Label(a, w1){ return a === w1; } // label repeats at each week start
  wireMonthNav('cal', ui.cal, renderCalendar);
  $$('.cal-bar, .cal-rail, .cal-legend .lg', v).forEach(el => el.addEventListener('click', () => openDetail(el.dataset.id)));
}
/* ============ health tracker ============ */
function renderHealth(){
  const v = $('#view-health');
  const { y, m } = ui.health;
  const daysIn = new Date(y, m+1, 0).getDate();
  const lead = (new Date(y, m, 1).getDay() + 6) % 7;
  const tStr = todayStr();
  const goal = db.settings.stepGoal || 8000;

  const dayData = d => db.health[dateStr(new Date(y, m, d))] || null;
  let total = 0, best = 0, bestD = 0, daysWith = 0, goalDays = 0, walkMin = 0, maxSteps = 1;
  for (let d = 1; d <= daysIn; d++){
    const h = dayData(d); if (!h || !h.steps) { walkMin += h?.walkMin||0; continue; }
    total += h.steps; daysWith++;
    if (h.steps > best){ best = h.steps; bestD = d; }
    if (h.steps >= goal) goalDays++;
    walkMin += h.walkMin || 0;
    maxSteps = Math.max(maxSteps, h.steps);
  }
  // current streak (from today backwards)
  let streak = 0; let cur = new Date();
  if (!db.health[todayStr()]?.steps || db.health[todayStr()].steps < goal) cur = addDays(cur, -1);
  while (true){
    const h = db.health[dateStr(cur)];
    if (h && h.steps >= goal){ streak++; cur = addDays(cur, -1); } else break;
  }
  const todayH = db.health[tStr];

  // dot grid
  const dows = ['M','T','W','T','F','S','S'];
  let dots = dows.map(d => `<div class="dh">${d}</div>`).join('');
  for (let i = 0; i < lead; i++) dots += `<div class="dotcell out"></div>`;
  for (let d = 1; d <= daysIn; d++){
    const ds = dateStr(new Date(y, m, d));
    const h = db.health[ds];
    const pct = h && h.steps ? clamp(h.steps / goal, 0, 1) : 0;
    const cls = [ h && h.steps ? '' : 'blank', pct >= 1 ? 'hit' : '', ds === tStr ? 'today' : '' ].join(' ');
    dots += `<div class="dotcell ${cls}" data-ds="${ds}" title="${h && h.steps ? fmtNum(h.steps) + ' steps' : 'no data — click to log'}">
      <span class="n">${d}</span>
      <span class="c">${pct > 0 && pct < 1 ? `<span class="pct" style="background:conic-gradient(var(--sepia) ${Math.round(pct*360)}deg, transparent 0)"></span>` : pct >= 1 ? `<span class="pct"></span>` : ''}</span>
    </div>`;
  }

  // bar chart
  let chart = '';
  for (let d = 1; d <= daysIn; d++){
    const h = dayData(d);
    const s = h?.steps || 0;
    chart += `<div class="col ${s >= goal ? 'goalhit' : ''}" data-ds="${dateStr(new Date(y, m, d))}" title="${d} ${MONTHS[m].slice(0,3)} — ${fmtNum(s)} steps">
      <div class="bar" style="height:${s ? Math.max(3, Math.round(s / maxSteps * 100)) : 0}%"></div>
      ${d % 5 === 0 || d === 1 ? `<span class="d">${d}</span>` : `<span class="d"></span>`}
    </div>`;
  }

  // walks list
  const walks = [];
  for (let d = 1; d <= daysIn; d++){
    const h = dayData(d);
    if (h && (h.walkMin || h.walkKm)) walks.push({ d, ...h });
  }

  v.innerHTML = `
    ${monthHeadHTML(y, m, 'hl')}
    <div class="health-top">
      <div class="panel screws pedometer">
        <div class="section-label"><span class="tag">pedometer</span> today</div>
        <div class="lcd">
          <div style="padding:0"><span class="label dim">steps · ${tStr}</span>
          <div class="val">${todayH?.steps ? fmtNum(todayH.steps) : '——'}</div>
          <div class="goal dim">goal ${fmtNum(goal)} ${todayH?.steps >= goal ? '· HIT ✓' : ''}</div>
          <div class="bar"><i style="width:${todayH?.steps ? Math.round(clamp(todayH.steps/goal,0,1)*100) : 0}%"></i></div></div>
        </div>
        <div class="row" style="justify-content:center">
          <button class="btn primary" id="hl-sync-main" style="font-size:12px; padding:11px 26px">⌁ SYNC</button>
          ${db.settings.simpleHealth ? '' : `
          <button class="btn" id="hl-log">✎ log a day</button>
          <label class="btn filelabel">${ICONS.ul} import<input type="file" id="hl-csv" accept=".csv,.json,text/csv,application/json"></label>
          ${!NATIVE && db.settings.linkedName ? `<button class="btn ghost" id="hl-unlink">unlink</button>` : ''}`}
        </div>
      </div>
      <div class="panel screws">
        <div class="section-label"><span class="tag">${MONTHS[m].slice(0,3)} ’${String(y).slice(2)}</span> month stats</div>
        <div class="stat-row">
          <div class="stat inset"><div class="v">${fmtNum(total)}</div><div class="k">total steps</div></div>
          <div class="stat inset"><div class="v">${daysWith ? fmtNum(Math.round(total/daysWith)) : '—'}</div><div class="k">daily avg</div></div>
          <div class="stat inset"><div class="v">${best ? fmtNum(best) : '—'}</div><div class="k">best · ${bestD ? bestD + ' ' + MONTHS[m].slice(0,3) : ''}</div></div>
          <div class="stat inset"><div class="v">${goalDays}<span class="muted">/${daysIn}</span></div><div class="k">goal days</div></div>
          <div class="stat inset"><div class="v">${streak}</div><div class="k">streak ${streak ? '🔥'.replace('🔥','▲') : ''}</div></div>
          <div class="stat inset"><div class="v">${walkMin ? fmtNum(walkMin) : '—'}</div><div class="k">walk min</div></div>
        </div>
      </div>
    </div>
    ${vitalsHTML()}
    ${pillsHTML()}
    <div class="panel screws" style="margin-top:16px">
      <div class="health-cols">
        <div>
          <div class="section-label"><span class="tag">habit grid</span> ${fmtNum(goal)} step days</div>
          <div class="dotgrid">${dots}</div>
          <div class="mono small muted" style="margin-top:10px">○ no data · ◔ partial · <span style="color:var(--ok)">✓ goal hit</span> — click a day to log</div>
        </div>
        <div>
          <div class="section-label"><span class="tag">step chart</span> daily counts</div>
          <div class="inset"><div class="stepchart">${chart}</div></div>
          ${walks.length ? `
            <div class="section-label" style="margin-top:16px"><span class="tag">walk log</span> recorded walks</div>
            <div class="walk-list">${walks.map(w => `
              <div class="walk-item"><span>${w.d} ${MONTHS[m].slice(0,3)}</span>
              <span class="mono">${w.walkMin ? w.walkMin + ' min' : ''}${w.walkMin && w.walkKm ? ' · ' : ''}${w.walkKm ? w.walkKm + ' km' : ''}</span></div>`).join('')}
            </div>` : ''}
        </div>
      </div>
    </div>`;

  wireMonthNav('hl', ui.health, renderHealth);
  wireVitals(v);
  wirePills(v);
  $('#hl-log')?.addEventListener('click', () => openDayModal(tStr));
  $$('.dotcell[data-ds], .stepchart .col', v).forEach(el => el.addEventListener('click', () => openDayModal(el.dataset.ds)));
  $('#hl-csv')?.addEventListener('change', ev => { const f = ev.target.files[0]; if (f) importHealthCSV(f); ev.target.value = ''; });
  $('#hl-unlink')?.addEventListener('click', unlinkStepsFile);
  $('#hl-sync-main')?.addEventListener('click', () => {
    if (NATIVE){ toast('⌁ reading health connect…'); try { MoodNative.requestSteps(90); } catch(e){ toast('⚠ ' + e.message); } }
    else if ('showOpenFilePicker' in window){ db.settings.linkedName ? syncStepsFile(true) : linkStepsFile(); }
    else toast('⚠ this browser can\'t link files — use import in advanced controls (settings)');
  });
}

/* becherglas: lab beaker with pour spout, ml graduations, glass shine,

  return `<svg viewBox="0 0 170 214" class="wtank" id="w-glass" xmlns="http://www.w3.org/2000/svg">
    <!-- base shadow -->
    <ellipse cx="85" cy="193" rx="54" ry="6" fill="var(--shadow-soft)"/>
    <!-- water, clipped to the beaker interior -->
    <defs><clipPath id="wclip"><path d="M41 30 L41 178 Q41 187 50 187 L120 187 Q129 187 129 178 L129 30 Z"/></clipPath></defs>
    <g clip-path="url(#wclip)">
      <rect id="w-rect" x="36" y="${y.toFixed(1)}" width="98" height="170" fill="var(--wtr)" opacity=".78"/>
      <ellipse id="w-wave" cx="70" cy="${y.toFixed(1)}" rx="38" ry="3.4" fill="var(--wtr)" opacity=".95"/>

      <text x="108" y="${yFor(f)+2.5}" text-anchor="end" style="font-family:'Space Mono',monospace; font-size:7px; letter-spacing:.5px" fill="var(--ink-3)">${gl(f)}</text>`).join('')}
    ${[.125,.375,.625,.875].map(f => `<line x1="119" x2="126" y1="${yFor(f)}" y2="${yFor(f)}" stroke="var(--ink-3)" stroke-width="1" opacity=".7"/>`).join('')}
    <!-- beaker glass: walls + rounded bottom + pour spout top-left -->
    <path d="M38 22 Q33 16 27 15 M38 22 L38 178 Q38 190 50 190 L120 190 Q132 190 132 178 L132 22"
      fill="none" stroke="var(--ink)" stroke-width="3" stroke-linecap="round"/>
    <!-- rim opening (slight 3d ellipse) -->
    <path d="M38 22 Q85 30 132 22" fill="none" stroke="var(--ink)" stroke-width="2.2"/>
    <!-- inner glass line + shine -->
    <path d="M44 34 L44 172" stroke="rgba(255,253,242,.65)" stroke-width="4" stroke-linecap="round"/>
    <path d="M52 40 L52 90" stroke="rgba(255,253,242,.35)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- washi-tape label with the readout -->
    <g transform="rotate(-4 85 105)">
      <rect x="50" y="86" width="70" height="38" fill="var(--sepia-2)" opacity=".38"/>
      <rect x="50" y="86" width="70" height="38" fill="none" stroke="var(--sepia)" stroke-width="1" stroke-dasharray="3 3" opacity=".5"/>
      <text x="85" y="112" text-anchor="middle" style="font-family:'Caveat',cursive; font-weight:700; font-size:26px" fill="var(--ink)">${Math.round(pct * 100)}%</text>
    </g>
    <!-- readout under the beaker -->
    <text x="85" y="207" text-anchor="middle" style="font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1px" fill="var(--ink-2)">${fmtNum(w)} / ${fmtNum(goal)} ML${pct >= 1 ? ' · FULL ✓' : ''}</text>
  </svg>`;
}
function nextWaterSlotLabel(){
  const r = db.settings.waterRemind;
  if (!r.on) return '';
  const [fh, fm] = r.from.split(':').map(Number), [th, tm] = r.to.split(':').map(Number);
  const now2 = new Date();
  let slot = new Date(now2); slot.setHours(fh, fm, 0, 0);
  const end = new Date(now2); end.setHours(th, tm, 0, 0);
  while (slot <= now2) slot = new Date(slot.getTime() + r.everyMin * 60000);
  if (slot > end){ slot = new Date(now2.getTime() + 86400000); slot.setHours(fh, fm, 0, 0); slot = new Date(slot.getTime() + r.everyMin * 60000); return `next ⏰ tomorrow ${pad2(slot.getHours())}:${pad2(slot.getMinutes())}`; }
  return `next ⏰ <b>${pad2(slot.getHours())}:${pad2(slot.getMinutes())}</b>`;
}

          </div>

          </div>` : `<span class="mono small muted">no glasses logged yet today</span>`}
          <div class="row" style="gap:8px">
            <span class="tgl ${rem.on ? 'on' : ''}" id="w-remind"></span>
            <span class="wnext">${rem.on ? nextWaterSlotLabel() : `reminders off · every ${(rem.everyMin/60).toFixed(rem.everyMin % 60 ? 1 : 0)}h ${rem.from}–${rem.to}`}</span>
          </div>
        </div>
      </div>
    </div>
    <div class="panel screws">
      <div class="section-label"><span class="tag">sleep</span> last night ${fmtSleep(db.sleep[t] || db.sleep[dateStr(addDays(new Date(), -1))])}</div>
      <div class="sleep-bars">
        ${days7.map(d => {
          const m = db.sleep[d] || 0;
          return `<div class="sb ${m >= 420 ? 'good' : ''}" data-sd="${d}" title="${fmtNice(d)} — ${fmtSleep(m)}">
            <i style="height:${m ? Math.max(4, Math.round(m / 600 * 100)) : 0}%"></i><span class="d">${parseDate(d).getDate()}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="mono small muted" style="margin-top:6px">7-day avg ${fmtSleep(sAvg)}${NATIVE ? ' · from health connect' : ''} · tap a bar to edit</div>
    </div>
  </div>`;
}
function wireVitals(v){
  const t = todayStr();
  const animateDial = () => {
    const pct = clamp((db.water[t] || 0) / (db.settings.waterGoal || 2000), 0, 1);
    const y = (186 - 152 * pct).toFixed(1);
    if ($('#w-rect')){
      $('#w-rect').setAttribute('y', y);
      $('#w-wave')?.setAttribute('cy', y);
      $('#w-wave2')?.setAttribute('cy', y);
    }
    setTimeout(renderHealth, 950);
  };
  const addWater = ml => {
    const goal = db.settings.waterGoal || 2000;
    const before = db.water[t] || 0;
    db.water[t] = Math.max(0, before + ml);
    if (ml > 0){
      (db.waterLog[t] = db.waterLog[t] || []).push({ t: `${pad2(new Date().getHours())}:${pad2(new Date().getMinutes())}`, ml });
      try { if (NATIVE && MoodNative.writeWater) MoodNative.writeWater(ml); } catch(_){}
      if (db.water[t] >= goal && before < goal) toast('water goal hit ✓ well done');
    }
    save(); animateDial();
  };
  $$('[data-wadd]', v).forEach(b => b.addEventListener('click', () => addWater(+b.dataset.wadd)));
  $$('[data-wdel]', v).forEach(b => b.addEventListener('click', () => {
    const log = db.waterLog[t] || [];
    const rec = log[+b.dataset.wdel];
    if (!rec) return;
    log.splice(+b.dataset.wdel, 1);
    db.water[t] = Math.max(0, (db.water[t] || 0) - rec.ml);
    save(); animateDial();
  }));
  $('#w-remind')?.addEventListener('click', () => {
    db.settings.waterRemind.on = !db.settings.waterRemind.on;
    save(); scheduleReminders(); renderHealth();
    toast(db.settings.waterRemind.on ? '⌁ water reminders on' : 'water reminders off');
  });
  $$('.sb[data-sd]', v).forEach(b => b.addEventListener('click', () => {
    const d = b.dataset.sd;
    const cur = db.sleep[d] || 0;
    const inp = prompt(`Sleep on ${fmtNice(d)} — hours (e.g. 7.5):`, cur ? (cur/60).toFixed(1) : '');
    if (inp === null) return;
    const h = parseFloat(String(inp).replace(',', '.'));
    if (!h){ delete db.sleep[d]; } else db.sleep[d] = Math.round(h * 60);
    save(); renderHealth();
  }));
}

/* hand-inked pill doodles — micron-pen outlines, wobbly shapes, echo strokes,

  const c = p.color || PILL_COLORS[0];

  const shapes = {

/* ---- Samsung Health / generic CSV import ---- */
function importHealthCSV(file){
  const r = new FileReader();
  r.onload = () => {
    try {
      const dates = applySteps(parseStepsText(String(r.result)));
      if (!dates.length){ toast('⚠ no step rows recognized in that file'); return; }
      save(); renderHealth();
      toast(`imported ${dates.length} days (${dates[0]} → ${dates[dates.length-1]}) ✕`);
    } catch(e){ toast('⚠ import failed: ' + e.message); }
  };
  r.readAsText(file);
}
function parseHealthCSV(text){
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  // find header row: has a date-ish and a step-ish column
  let hi = -1, cols = [];
  for (let i = 0; i < Math.min(lines.length, 5); i++){
    const c = lines[i].split(',').map(s => s.trim().toLowerCase());
    const hasDate = c.some(x => /day_time|start_time|update_time|date|^day$/.test(x));
    const hasSteps = c.some(x => /^count$|step_count|^steps?$/.test(x));
    if (hasDate && hasSteps){ hi = i; cols = c; break; }
  }
  if (hi === -1) throw new Error('no date/steps header found');
  const di = cols.findIndex(x => /day_time|^date$|^day$/.test(x)) !== -1
    ? cols.findIndex(x => /day_time|^date$|^day$/.test(x))
    : cols.findIndex(x => /start_time|date|day/.test(x));
  const si = cols.findIndex(x => /^count$|step_count|^steps?$/.test(x));
  const map = {};
  for (let i = hi + 1; i < lines.length; i++){
    const parts = lines[i].split(',');
    if (parts.length <= Math.max(di, si)) continue;
    const dRaw = (parts[di]||'').trim(), sRaw = (parts[si]||'').trim();
    const steps = parseInt(sRaw, 10);
    if (!steps || steps < 0) continue;
    let ds = null;
    if (/^\d{13,}$/.test(dRaw)) ds = dateStrUTC(new Date(+dRaw));
    else if (/^\d{10}$/.test(dRaw)) ds = dateStrUTC(new Date(+dRaw * 1000));
    else if (/^\d{4}-\d{2}-\d{2}/.test(dRaw)) ds = dRaw.slice(0,10);
    else { const p = new Date(dRaw); if (!isNaN(p)) ds = dateStr(p); }
    if (!ds) continue;
    map[ds] = Math.max(map[ds]||0, steps);
  }
  return map;
}
// samsung day_time is midnight UTC of the tracked day
const dateStrUTC = d => `${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())}`;

/* ---- steps text parser: csv or json ---- */
function parseStepsText(text){
  const s = String(text).trim();
  if (s[0] === '{' || s[0] === '['){
    const j = JSON.parse(s);
    const map = {}, extras = {};
    const put = (d, steps, wm, wk) => {
      if (d == null) return;
      const ds = String(d).slice(0, 10);
      if (!/^\d{4}-\d{2}-\d{2}$/.test(ds)) return;
      if (+steps > 0) map[ds] = Math.max(map[ds]||0, Math.round(+steps));
      if (+wm > 0 || +wk > 0) extras[ds] = { walkMin:+wm||0, walkKm:+wk||0 };
    };
    if (Array.isArray(j)) j.forEach(r => r && put(r.date ?? r.day ?? r.startTime, r.steps ?? r.count ?? r.step_count, r.walkMin ?? r.walk_min, r.walkKm ?? r.walk_km));
    else Object.entries(j).forEach(([k, v]) => (v && typeof v === 'object') ? put(k, v.steps ?? v.count, v.walkMin, v.walkKm) : put(k, v));
    return { map, extras };
  }
  return { map: parseHealthCSV(s), extras: {} };
}
function applySteps({ map, extras }){
  const dates = Object.keys(map);
  dates.forEach(d => { const prev = db.health[d] || {}; db.health[d] = { ...prev, steps: Math.max(prev.steps||0, map[d]) }; });
  Object.keys(extras).forEach(d => { db.health[d] = { ...(db.health[d]||{}), ...extras[d] }; });
  return dates.sort();
}

/* ---- linked auto-sync file (file system access api, chrome/edge) ----
   phone writes a csv/json into a synced folder (drive / syncthing) →
   mood re-reads the same file: silently on open, or via the sync key */
const idbKV = {
  _db: null,
  open(){ return new Promise((res, rej) => {
    if (idbKV._db) return res(idbKV._db);
    const r = indexedDB.open('mood-fs', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('kv');
    r.onsuccess = () => { idbKV._db = r.result; res(r.result); };
    r.onerror = () => rej(r.error);
  }); },
  async set(k, v){ const d = await idbKV.open(); return new Promise((res, rej) => { const t = d.transaction('kv','readwrite'); t.objectStore('kv').put(v, k); t.oncomplete = res; t.onerror = () => rej(t.error); }); },
  async get(k){ const d = await idbKV.open(); return new Promise((res, rej) => { const g = d.transaction('kv').objectStore('kv').get(k); g.onsuccess = () => res(g.result); g.onerror = () => rej(g.error); }); },
  async del(k){ const d = await idbKV.open(); return new Promise(res => { const t = d.transaction('kv','readwrite'); t.objectStore('kv').delete(k); t.oncomplete = res; }); },
};
async function linkStepsFile(){
  try {
    const [h] = await window.showOpenFilePicker({ types:[{ description:'steps csv / json', accept:{ 'text/csv':['.csv'], 'application/json':['.json'] } }] });
    await idbKV.set('stepsFile', h);
    db.settings.linkedName = h.name; save();
    await syncStepsFile(true);
  } catch(e){ if (e.name !== 'AbortError') toast('⚠ could not link: ' + e.message); }
}
async function unlinkStepsFile(){
  await idbKV.del('stepsFile');
  delete db.settings.linkedName; delete db.settings.lastSync;
  save(); renderHealth(); toast('sync file unlinked');
}
async function syncStepsFile(interactive){
  let h; try { h = await idbKV.get('stepsFile'); } catch(_){}
  if (!h){ if (interactive) toast('⚠ no file linked'); return; }
  try {
    let perm = await h.queryPermission({ mode:'read' });
    if (perm !== 'granted'){
      if (!interactive) return;               // silent startup attempt — never prompt
      perm = await h.requestPermission({ mode:'read' });
      if (perm !== 'granted'){ toast('⚠ read permission denied'); return; }
    }
    const file = await h.getFile();
    const dates = applySteps(parseStepsText(await file.text()));
    db.settings.lastSync = `${todayStr()} ${new Date().toTimeString().slice(0,5)}`;
    save();
    if (ui.view === 'health') renderHealth();
    toast(dates.length ? `synced ${dates.length} days from ${h.name} ✕` : 'synced — no step rows found');
  } catch(e){ if (interactive) toast('⚠ sync failed: ' + e.message); }
}
/* ============ habits — don't break the chain ============ */
function habitStreak(h){
  let cur = 0, d = new Date();
  if (!h.days[dateStr(d)]) d = addDays(d, -1);          // today still pending doesn't kill the chain
  while (h.days[dateStr(d)]){ cur++; d = addDays(d, -1); }
  const ks = Object.keys(h.days).sort();
  let best = 0, run = 0, prev = null;
  ks.forEach(k => {
    run = (prev && (parseDate(k) - parseDate(prev)) === 86400000) ? run + 1 : 1;
    best = Math.max(best, run); prev = k;
  });
  return { cur, best, total: ks.length };
}
function renderHabits(){
  const v = $('#view-habits');
  const t = todayStr();
  const days = Array.from({ length: 14 }, (_, i) => dateStr(addDays(new Date(), i - 13)));
  v.innerHTML = `
    <div class="section-label"><span class="tag">chains</span> ${db.habits.length} habits — don't break them</div>

function syncQueueWithStatus(e){ if (e.status !== 'planned') db.queue = db.queue.filter(id => id !== e.id); }

/* time-to-finish estimates (remaining, in minutes; null = unknown) */
function estimateMin(e){
  if (e.type === 'movie') return e.status === 'done' ? 0 : (e.runtimeMin || 120);
  if (e.type === 'tv'){
    const all = e.seasons.flatMap(s => s.episodes);
    if (!all.length) return null;
    return all.filter(x => !x.watched).length * (e.epMin || 40);
  }
  if (e.type === 'book'){
    if (!e.pagesTotal) return null;
    return Math.max(0, e.pagesTotal - (e.pagesRead || 0)) * 1.5;   // ~40 pages/hour
  }
  if (e.type === 'game') return e.playHours ? e.playHours * 60 : null;
  return null;
}
function fmtDur(min){
  if (min === null) return null;
  if (min < 55) return `${Math.max(1, Math.round(min / 5) * 5)}m`;
  const h = min / 60;
  return h < 10 ? `${(Math.round(h * 2) / 2).toString().replace('.0','')}h` : `${Math.round(h)}h`;
}
function etaHTML(e){
  const f = fmtDur(estimateMin(e));
  return f ? ` <span class="eta">· ≈${f}${e.status === 'active' ? ' left' : ''}</span>` : '';
}
function sumEta(list){
  let tot = 0, unknown = 0;
  list.forEach(e => { const m = estimateMin(e); if (m === null) unknown++; else tot += m; });
  if (!tot && unknown) return null;
  return fmtDur(tot) + (unknown ? '+' : '');
}

function renderQueue(){
  const v = $('#view-queue');
  const items = db.queue.map(id => db.media.find(m => m.id === id)).filter(Boolean);
  if (items.length !== db.queue.length){ db.queue = items.map(e => e.id); save(); } // heal stale ids
  const active = db.media.filter(e => e.status === 'active').sort((a,b) => (b.startDate||'').localeCompare(a.startDate||''));

  v.innerHTML = `
    ${active.length ? `
    <div class="qsec">
      <div class="section-label"><span class="tag">in progress</span> ${active.length} going${sumEta(active) ? ` · ≈${sumEta(active)} left` : ''}</div>
      <div class="queue-wrap"><div class="queue-thread">${active.map(e => qItemHTML(e, null, 'progress')).join('')}</div></div>
    </div>` : ''}

    <div class="qsec">
      <div class="section-label"><span class="tag">up next</span> ${items.length} queued${sumEta(items) ? ` · ≈${sumEta(items)} of media` : ''} — hold ⣿ and drag to reorder</div>
      <div class="queue-wrap">
        ${items.length
          ? `<div class="queue-thread" id="q-thread">${items.map((e,i) => qItemHTML(e, i, 'queue')).join('')}</div>`
          : `<div class="empty-state" style="padding:26px 10px"><span class="hand">the queue is empty…</span><span class="mono">log something as ○ planned and it lines up here</span></div>`}
      </div>
    </div>

    <div class="qsec">
      <div class="section-label"><span class="tag">my lists</span> reading orders, marathons, backlogs</div>
      ${db.lists.map(l => {
        const les = l.items.map(id => db.media.find(m => m.id === id)).filter(Boolean);
        const done = les.filter(e => e.status === 'done').length;
        return `
        <div class="queue-wrap" style="margin-bottom:18px">
          <div class="list-head" data-list="${l.id}">
            <span class="ln">${esc(l.name)}</span>
            <span class="cnt">${done}/${les.length} done${(() => { const s = sumEta(les.filter(e => e.status !== 'done')); return s ? ' · ≈' + s + ' left' : ''; })()}</span>
            <span class="lact"><button data-lact="ren">✎ rename</button><button data-lact="del">– delete</button></span>
          </div>
          ${les.length
            ? `<div class="queue-thread" data-listthread="${l.id}">${les.map((e,i) => qItemHTML(e, i, 'list', l.id)).join('')}</div>`
            : `<div class="mono small muted" style="padding:6px 0 2px">empty — open any entry → "add to list…"</div>`}
        </div>`;
      }).join('')}
      <button class="btn ghost" id="q-newlist">+ new list</button>
    </div>`;

  $$('.q-cover, .q-info .t', v).forEach(el =>
    el.addEventListener('click', () => openDetail(el.closest('.q-item').dataset.id)));

  $$('[data-qact]', v).forEach(b => b.addEventListener('click', () => {
    const item = b.closest('.q-item');
    const id = item.dataset.id, listId = item.dataset.list;
    const e = db.media.find(m => m.id === id); if (!e) return;
    const act = b.dataset.qact;
    if (act === 'start'){ e.status = 'active'; e.startDate = e.startDate || todayStr(); syncQueueWithStatus(e); toast('▸ started'); }
    if (act === 'done'){ e.status = 'done'; e.endDate = e.endDate || todayStr(); if (!e.startDate) e.startDate = e.endDate; syncQueueWithStatus(e); toast('✓ finished ✕'); }
    if (act === 'undone'){ e.status = 'active'; e.endDate = ''; toast('back in progress →'); }
    if (act === 'rm'){
      if (listId){ const l = db.lists.find(x => x.id === listId); if (l) l.items = l.items.filter(x => x !== id); }
      else db.queue = db.queue.filter(x => x !== id);
      toast('removed');
    }
    save(); renderQueue();
  }));

  $$('[data-lact]', v).forEach(b => b.addEventListener('click', () => {
    const lid = b.closest('.list-head').dataset.list;
    const l = db.lists.find(x => x.id === lid); if (!l) return;
    if (b.dataset.lact === 'ren'){ const n = (prompt('List name:', l.name) || '').trim(); if (n){ l.name = n; save(); renderQueue(); } }
    if (b.dataset.lact === 'del'){ if (confirm(`Delete list "${l.name}"? (entries stay in the library)`)){ db.lists = db.lists.filter(x => x.id !== lid); save(); renderQueue(); } }
  }));

  $('#q-newlist').addEventListener('click', () => {
    const n = (prompt('New list name (e.g. "Cosmere reading order"):') || '').trim();
    if (!n) return;
    db.lists.push({ id: uid(), name: n, items: [] });
    save(); renderQueue(); toast(`list "${n}" created — add from any entry`);
  });

  wireThreadDrag($('#q-thread'), ids => { db.queue = ids; save(); renderQueue(); });
  db.lists.forEach(l => wireThreadDrag($(`[data-listthread="${l.id}"]`, v), ids => { l.items = ids; save(); renderQueue(); }));
}

function qItemHTML(e, i, mode, listId){
  const t = TYPES[e.type];
  const p = progressOf(e);
  const isDone = e.status === 'done';
  const actions =
    mode === 'progress' ? `<button class="btn" data-qact="done">✓ done</button>` :
    mode === 'list' ? (isDone
      ? `<button class="btn ghost" data-qact="undone">○ un-done</button><button class="btn ghost" data-qact="rm">– remove</button>`
      : `<button class="btn" data-qact="done">✓ done</button><button class="btn ghost" data-qact="rm">– remove</button>`) :
    `<button class="btn" data-qact="start">▸ start</button><button class="btn" data-qact="done">✓ done</button><button class="btn ghost" data-qact="rm">– remove</button>`;
  return `<div class="q-item ${isDone ? 'done' : ''}" data-id="${e.id}" ${listId ? `data-list="${listId}"` : ''}>
    ${mode === 'progress' ? `<div class="q-handle" style="visibility:hidden">⣿</div>` : `<div class="q-handle" title="drag to reorder">⣿</div>`}
    <div class="q-no">${isDone ? '✓' : mode === 'progress' ? '→' : pad2(i+1)}</div>
    <div class="q-cover">${e.cover ? `<img src="${esc(e.cover)}" loading="lazy" onerror="imgFb(this)">` : `<div class="ph">${t.icon}</div>`}</div>
    <div class="q-info">
      <div class="t">${esc(e.title)}</div>
      <div class="s">${t.label}${e.year ? ' · ' + esc(e.year) : ''}${e.creator ? ' · ' + esc(e.creator) : ''}${isDone ? '' : etaHTML(e)}</div>
      ${mode === 'progress' && p !== null ? `<div class="q-prog" title="${Math.round(p*100)}%"><i style="width:${Math.round(p*100)}%"></i></div>` : ''}
      <div class="q-actions">${actions}</div>
    </div>
  </div>`;
}

function wireThreadDrag(container, onDrop){
  if (!container) return;
  let dragEl = null;
  $$('.q-handle', container).forEach(h => {
    h.addEventListener('pointerdown', ev => {
      dragEl = h.closest('.q-item');
      dragEl.classList.add('dragging');
      h.setPointerCapture(ev.pointerId);
      ev.preventDefault();
    });
    h.addEventListener('pointermove', ev => {
      if (!dragEl) return;
      const others = $$('.q-item:not(.dragging)', container);
      const next = others.find(it => { const r = it.getBoundingClientRect(); return ev.clientY < r.top + r.height/2; });
      if (next) container.insertBefore(dragEl, next); else container.appendChild(dragEl);
    });
    const drop = () => {
      if (!dragEl) return;
      dragEl.classList.remove('dragging'); dragEl = null;
      onDrop($$('.q-item', container).map(x => x.dataset.id));
    };
    h.addEventListener('pointerup', drop);
    h.addEventListener('pointercancel', drop);
  });
}

/* ============ spend — llm ledger ============ */
const SPEND_PROMPT = `You are a personal finance analyst. Analyze the bank statement I provide (pasted text, or attached image/pdf pages).

Rules:
- List EVERY outgoing expense as its own transaction with a short merchant description (strip card numbers and dates from the description).
- Assign each transaction one category. Use 6-10 clear, reusable categories (examples: Rent & Bills, Groceries, Dining Out, Transport, Subscriptions, Health, Shopping, Entertainment, Other).
- Ignore income, refunds, and transfers between my own accounts.
- Use the statement's currency symbol for "currency" (₺ for turkish lira).
RULES_EXTRA
Reply with ONLY this JSON — no markdown fences, no commentary:
{"month":"MONTH_KEY","currency":"₺","transactions":[{"desc":"MIGROS","amount":123.45,"category":"Groceries"}]}

My statement:
<<< paste your bank statement here >>>`;

function spendKey(){ const { y, m } = ui.spend; return `${y}-${pad2(m+1)}`; }
const ruleKey = d => String(d).toLowerCase().replace(/[\d*#.,:\-\/]/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 26);
function buildSpendPrompt(){
  const rules = Object.entries(db.spendRules).slice(-30);
  const extra = rules.length
    ? `- The user has manually corrected these merchants before — ALWAYS use these categories for them: ${rules.map(([k, v]) => `"${k}" → ${v}`).join('; ')}.\n`
    : '';
  return SPEND_PROMPT.replace('MONTH_KEY', () => spendKey()).replace('RULES_EXTRA', () => extra);
}
function applySpendRules(tx){
  tx.forEach(t => { const r = db.spendRules[ruleKey(t.desc)]; if (r) t.cat = r; });
}
function groupTx(tx){
  const map = {};
  tx.forEach((t, i) => {
    (map[t.cat] = map[t.cat] || { name: t.cat, amount: 0, txs: [] });
    map[t.cat].amount += t.amt;
    map[t.cat].txs.push({ ...t, i });
  });
  return Object.values(map).sort((a, b) => b.amount - a.amount);
}
function monthTx(data){
  if (Array.isArray(data.tx)) return data.tx;
  // legacy category-only imports become single synthetic rows
  return (data.categories || []).map(c => ({ desc: '— imported as a category total —', amt: c.amount, cat: c.name }));
}

function parseSpendText(text){
  let s = String(text).trim().replace(/^```[a-z]*\s*/i, '').replace(/```\s*$/, '').trim();
  let month = null, currency = '', cats = [], tx = [];
  const num = raw => {
    let n = String(raw);
    if (n.includes(',') && n.includes('.')) n = n.lastIndexOf(',') > n.lastIndexOf('.') ? n.replace(/\./g,'').replace(',', '.') : n.replace(/,/g, '');
    else if (n.includes(',')) n = /,\d{1,2}$/.test(n) ? n.replace(',', '.') : n.replace(/,/g, '');
    return parseFloat(n);
  };
  let j = null; try { j = JSON.parse(s); } catch(_){}
  if (j){
    if (Array.isArray(j)){
      if (j[0] && (j[0].desc !== undefined || j[0].description !== undefined || j[0].merchant !== undefined)) tx = j;
      else cats = j;
    } else if (typeof j === 'object'){
      if (/^\d{4}-\d{2}/.test(String(j.month || ''))) month = String(j.month).slice(0,7);
      currency = String(j.currency || '');
      if (Array.isArray(j.transactions)) tx = j.transactions;
      else if (Array.isArray(j.categories)) cats = j.categories;
      else cats = Object.entries(j).filter(([,v]) => typeof v === 'number').map(([name, amount]) => ({ name, amount }));
    }
    tx = tx.map(t => ({
      desc: String(t.desc ?? t.description ?? t.merchant ?? '?').trim().slice(0, 60) || '?',
      amt: +(t.amount ?? t.amt ?? 0),
      cat: String(t.category ?? t.cat ?? 'Other').trim() || 'Other',
    })).filter(t => t.amt > 0);
    cats = cats.map(c => ({ name: String(c.name ?? c.category ?? '').trim(), amount: +(c.amount ?? c.total ?? c.sum ?? 0) })).filter(c => c.name && c.amount > 0);
  } else {
    // plain lines: "Food, 420" | "Food: 420.50" | "| Food | 420 |"
    s.split(/\r?\n/).forEach(line => {
      const m = line.match(/^\|?\s*([^|,:;\t]+?)\s*[|,:;\t]+\s*[₺$€£]?\s*([\d.,]+)\s*\|?\s*$/);
      if (!m) return;
      const name = m[1].trim();
      if (!name || /^(category|categories|name|total|sum|amount)$/i.test(name)) return;
      const amount = num(m[2]);
      if (amount > 0) cats.push({ name, amount });
    });
    const cur = s.match(/[₺$€£]/); currency = cur ? cur[0] : '';
  }
  if (!tx.length && cats.length) tx = cats.map(c => ({ desc: '— imported as a category total —', amt: c.amount, cat: c.name }));
  if (!tx.length) throw new Error('nothing recognized — expected the json from the prompt, or "category, amount" lines');
  return { month, currency, tx };
}

function importSpend(text){
  try {
    const p = parseSpendText(text);
    applySpendRules(p.tx);
    if (p.month){ const [yy, mm] = p.month.split('-').map(Number); ui.spend = { y: yy, m: mm - 1 }; }
    const key = p.month || spendKey();
    db.spend[key] = { currency: p.currency || db.spend[key]?.currency || '₺', tx: p.tx, importedAt: todayStr() };
    ui.spendTab = 'ledger';
    save(); renderSpend();
    toast(`ledger stamped — ${p.tx.length} transactions ✕`);
  } catch(e){ toast('⚠ ' + e.message); }
}

function donutSVG(cats, currency, total){
  const R = 70, C = 2 * Math.PI * R;
  let off = 0;
  const segs = cats.map((c, i) => {
    const frac = c.amount / total;
    const seg = `<circle r="${R}" cx="100" cy="100" fill="none" stroke="${PALETTE[i % PALETTE.length]}" stroke-width="32"
      stroke-dasharray="${Math.max(frac * C - 1.5, .8).toFixed(2)} ${C.toFixed(2)}" stroke-dashoffset="${(-off * C).toFixed(2)}"
      transform="rotate(-90 100 100)"><title>${esc(c.name)} — ${(frac*100).toFixed(0)}%</title></circle>`;
    off += frac;
    return seg;
  }).join('');
  return `<svg viewBox="0 0 200 200" style="max-width:260px; width:100%">
    <circle r="${R}" cx="100" cy="100" fill="none" stroke="var(--bg-lo)" stroke-width="32"/>
    ${segs}
    <circle r="51" cx="100" cy="100" fill="var(--bg-hi)" stroke="var(--line)"/>
    <text x="100" y="97" text-anchor="middle" style="font-family:'Libre Caslon Text',Georgia,serif; font-weight:700; font-size:20px" fill="var(--ink)">${esc(currency)}${fmtNum(Math.round(total))}</text>
    <text x="100" y="114" text-anchor="middle" style="font-family:'Space Mono',monospace; font-size:8px; letter-spacing:2px" fill="var(--ink-3)">TOTAL SPENT</text>
  </svg>`;
}

function renderSpend(){
  const v = $('#view-spend');
  v.innerHTML = `
    <div class="row" style="margin-bottom:16px">
      <button class="chip ${ui.spendTab==='ledger'?'on':''}" data-sptab="ledger">✕ ledger</button>
      <button class="chip ${ui.spendTab==='savings'?'on':''}" data-sptab="savings">₺ savings</button>

  $$('[data-sptab]', v).forEach(c => c.addEventListener('click', () => { ui.spendTab = c.dataset.sptab; renderSpend(); }));

/* ---- savings: joint interest account (₺) ---- */
const fmtTL = n => '₺' + Math.round(n).toLocaleString('tr-TR');
const NAMES = { can: 'can', ila: 'ilayda' };
const SAV_COLORS = { can: '#4F6E72', ila: '#B3542E', tot: null }; // tot uses ink

function savCalc(){
  const S = db.savings.entries.slice().sort((a, b) => a.date.localeCompare(b.date));
  const rows = S.map((e, i) => {
    const tot = e.can + e.ila;
    let int = null, rate = null;
    if (i > 0){
      const prev = S[i-1];
      const prevTot = prev.can + prev.ila;
      int = tot - (e.canAdd + e.ilaAdd) - prevTot;
      if (prevTot > 0) rate = int / prevTot;
    }
    return { ...e, tot, int, rate };
  });
  const rates = rows.map(r => r.rate).filter(r => r !== null && isFinite(r)).slice(-6);
  const avgRate = rates.length ? rates.reduce((a, b) => a + b, 0) / rates.length : 0;
  const later = rows.slice(1);
  const avgAdd = {
    can: later.length ? later.reduce((a, r) => a + (r.canAdd || 0), 0) / later.length : 0,
    ila: later.length ? later.reduce((a, r) => a + (r.ilaAdd || 0), 0) / later.length : 0,
  };
  const totInt = rows.reduce((a, r) => a + (r.int || 0), 0);
  return { rows, avgRate, avgAdd, totInt };
}

function savPredict(rows, avgRate, avgAdd, months = 6){
  if (!rows.length) return [];
  let { can, ila } = rows[rows.length - 1];
  const out = [];
  let d = parseDate(rows[rows.length - 1].date);
  for (let i = 0; i < months; i++){
    can = can * (1 + avgRate) + avgAdd.can;
    ila = ila * (1 + avgRate) + avgAdd.ila;
    d = new Date(d.getFullYear(), d.getMonth() + 1, Math.min(d.getDate(), 28));
    out.push({ date: dateStr(d), can, ila, tot: can + ila });
  }
  return out;
}

function savChartSVG(rows, pred){
  const all = [...rows, ...pred];
  if (all.length < 2) return `<div class="mono small muted" style="padding:20px">log at least two entries to draw the lines</div>`;
  const W = 720, H = 300, L = 66, R = 14, T = 18, B = 38;
  const yMax = Math.max(...all.map(p => p.tot)) * 1.06 || 1;
  const X = i => L + i * (W - L - R) / (all.length - 1);
  const Y = v => T + (H - T - B) * (1 - v / yMax);
  const fmtShort = v => v >= 1e6 ? (v/1e6).toFixed(1).replace('.0','') + 'M' : Math.round(v/1000) + 'k';
  const mLabel = ds => { const d = parseDate(ds); return MONTHS[d.getMonth()].slice(0,3); };
  const line = (getr, dashed, color) => {
    const idx0 = dashed ? rows.length - 1 : 0;
    const pts = dashed ? [rows[rows.length-1], ...pred] : rows;
    if (pts.length < 2) return '';
    return `<polyline fill="none" stroke="${color}" stroke-width="${dashed ? 2 : 2.6}" ${dashed ? 'stroke-dasharray="6 5" opacity=".55"' : ''}
      stroke-linejoin="round" stroke-linecap="round"
      points="${pts.map((p, k) => `${X(idx0 + k).toFixed(1)},${Y(getr(p)).toFixed(1)}`).join(' ')}"/>`;
  };
  const grid = [0.25, 0.5, 0.75, 1].map(f => {
    const v = yMax * f;
    return `<line x1="${L}" y1="${Y(v)}" x2="${W-R}" y2="${Y(v)}" stroke="var(--line)" stroke-dasharray="3 5" stroke-width="1"/>
      <text x="${L-8}" y="${Y(v)+3}" text-anchor="end" font-family="Space Mono,monospace" font-size="10" fill="var(--ink-3)">₺${fmtShort(v)}</text>`;
  }).join('');
  const xticks = all.map((p, i) => (all.length > 9 && i % 2) ? '' :
    `<text x="${X(i)}" y="${H-16}" text-anchor="middle" font-family="Space Mono,monospace" font-size="9" fill="var(--ink-3)">${mLabel(p.date)}</text>`).join('');
  const dots = rows.map((p, i) => ['tot','ila','can'].map(k =>
    `<circle cx="${X(i)}" cy="${Y(p[k === 'tot' ? 'tot' : k])}" r="3.4" fill="${k === 'tot' ? 'var(--ink)' : SAV_COLORS[k]}" stroke="var(--bg-hi)" stroke-width="1.4"><title>${mLabel(p.date)} — ${NAMES[k] || 'total'}: ${fmtTL(p[k])}</title></circle>`).join('')).join('');
  const split = pred.length ? `<line x1="${X(rows.length-1)}" y1="${T}" x2="${X(rows.length-1)}" y2="${H-B}" stroke="var(--sepia-2)" stroke-dasharray="2 4"/>
    <text x="${X(rows.length-1)+6}" y="${T+12}" font-family="Caveat,cursive" font-size="15" fill="var(--sepia)">forecast →</text>` : '';
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${grid}${split}
    ${line(p => p.tot, false, 'var(--ink)')}${pred.length ? line(p => p.tot, true, 'var(--ink)') : ''}
    ${line(p => p.ila, false, SAV_COLORS.ila)}${pred.length ? line(p => p.ila, true, SAV_COLORS.ila) : ''}
    ${line(p => p.can, false, SAV_COLORS.can)}${pred.length ? line(p => p.can, true, SAV_COLORS.can) : ''}
    ${dots}${xticks}
  </svg>`;
}

function renderSavings(box){
  const { rows, avgRate, avgAdd, totInt } = savCalc();
  const pred = savPredict(rows, avgRate, avgAdd);
  const last = rows[rows.length - 1];
  box.innerHTML = `
    <div class="sav-head">
      <div class="sav-title"><span class="m">Joint savings</span><span class="y">can + ilayda</span></div>
      <button class="btn primary" id="sav-add">✎ log entry</button>
    </div>
    ${rows.length ? `
    <div class="stat-row" style="margin-bottom:14px">
      <div class="stat inset"><div class="v">${fmtTL(last.tot)}</div><div class="k">total now</div></div>
      <div class="stat inset"><div class="v" style="color:${SAV_COLORS.ila}">${fmtTL(last.ila)}</div><div class="k">ilayda · ${Math.round(last.ila/last.tot*100)}%</div></div>
      <div class="stat inset"><div class="v" style="color:${SAV_COLORS.can}">${fmtTL(last.can)}</div><div class="k">can · ${Math.round(last.can/last.tot*100)}%</div></div>
      <div class="stat inset"><div class="v">${(avgRate*100).toFixed(1)}%</div><div class="k">est. monthly rate</div></div>
      <div class="stat inset"><div class="v">${fmtTL(totInt)}</div><div class="k">interest earned</div></div>
    </div>
    <div class="panel screws">

/* gemini: recipe import — structure, translate to turkish, localize ingredients */
const RECIPE_PROMPT = `You are a recipe assistant for a user living in Turkey. Read the recipe in the provided text and/or images.
Reply with ONLY this JSON (no markdown fences, no commentary):
{"title":"original title","titleTr":"türkçe başlık","servings":2,"ingredients":[{"name":"original name","nameTr":"türkçe adı (markette satıldığı adla)","amount":"200 g","sub":""}],"stepsTr":["adım 1 türkçe","adım 2 türkçe"]}
Rules:
- Translate EVERYTHING into Turkish; stepsTr must be complete, clear, fully Turkish steps.
- nameTr: the ingredient as sold in Turkish markets (Migros, A101, BİM).
- If an ingredient is hard to find in Turkey, put the closest local substitute into "sub" (in Turkish); otherwise leave "sub" empty.
- Keep amounts metric.`;

async function geminiRecipe(extraParts, sourceNote){
  const key = db.settings.geminiKey;
  if (!key){ toast('⚠ add a gemini api key in settings first'); return; }
  toast('⌁ gemini is reading the recipe…');
  const body = JSON.stringify({
    contents: [{ parts: [{ text: RECIPE_PROMPT }, ...extraParts] }],
    generationConfig: { response_mime_type: 'application/json', temperature: 0.2 },
  });
  let resp = null, lastErr = null;
  for (const model of ['gemini-2.5-flash', 'gemini-2.0-flash']){
    try {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
      if (r.status === 404){ lastErr = new Error('model not found'); continue; }
      if (!r.ok){ const err = await r.json().catch(() => null); throw new Error(err?.error?.message || 'HTTP ' + r.status); }
      resp = await r.json(); break;
    } catch(e){ lastErr = e; }
  }
  try {
    if (!resp) throw lastErr || new Error('no response');
    let text = (resp.candidates?.[0]?.content?.parts || []).map(p => p.text || '').join('');
    text = text.trim().replace(/^```[a-z]*\s*/i, '').replace(/```\s*$/, '');
    const j = JSON.parse(text);
    if (!Array.isArray(j.ingredients) || !j.ingredients.length) throw new Error('no ingredients recognized');
    db.kitchen.recipes.push({
      id: uid(),
      title: String(j.title || '').slice(0, 90),
      titleTr: String(j.titleTr || j.title || 'Tarif').slice(0, 90),
      servings: +j.servings || 0,
      ingredients: j.ingredients.map(i => ({
        name: String(i.name || '').slice(0, 60), nameTr: String(i.nameTr || i.name || '').slice(0, 60),
        amount: String(i.amount || '').slice(0, 30), sub: String(i.sub || '').slice(0, 80),
      })),
      stepsTr: (Array.isArray(j.stepsTr) ? j.stepsTr : []).map(s => String(s).slice(0, 400)),
      source: sourceNote || '', addedAt: todayStr(),
    });
    ui.kitchenTab = 'recipes';
    save(); closeModal();
    if (ui.view === 'kitchen') renderKitchen(); else switchView('kitchen');
    toast(`tarif kaydedildi ✕ ${j.titleTr || ''}`);
  } catch(e){ toast('⚠ recipe import failed: ' + e.message); }
}

async function geminiAudScore(e){

  for (const model of ['gemini-2.5-flash', 'gemini-2.0-flash']){

      if (!r.ok) continue;

/* gemini auto-analyze: bank screenshot(s) → categorized json → ledger */
async function geminiSpend(files){
  const key = db.settings.geminiKey;
  if (!key){ toast('⚠ add a gemini api key in settings first'); return; }
  if (!files.length) return;
  if (files.reduce((a, f) => a + f.size, 0) > 15 * 1024 * 1024){ toast('⚠ files too big (15mb max) — export fewer pages'); return; }
  toast('⌁ gemini is reading the statement…');
  try {
    const parts = [{ text: buildSpendPrompt()
      .replace('My statement:\n<<< paste your bank statement here >>>', () => 'My statement is in the attached file(s) — screenshots or pdf pages. If the statement shows a different month than the one in "month", use the month visible in the statement.') }];
    for (const f of files){
      const b64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(String(r.result).split(',')[1]);
        r.onerror = () => rej(new Error('could not read file'));
        r.readAsDataURL(f);
      });
      const mime = f.type || (f.name?.toLowerCase().endsWith('.pdf') ? 'application/pdf' : 'image/png');
      parts.push({ inline_data: { mime_type: mime, data: b64 } });
    }
    const body = JSON.stringify({ contents: [{ parts }], generationConfig: { response_mime_type: 'application/json', temperature: 0.1 } });
    let resp = null, lastErr = null;
    for (const model of ['gemini-2.5-flash', 'gemini-2.0-flash']){
      try {
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`,
          { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
        if (r.status === 404){ lastErr = new Error('model not found'); continue; }
        if (!r.ok){ const err = await r.json().catch(() => null); throw new Error(err?.error?.message || 'HTTP ' + r.status); }
        resp = await r.json(); break;
      } catch(e){ lastErr = e; }
    }
    if (!resp) throw lastErr || new Error('no response');
    const text = (resp.candidates?.[0]?.content?.parts || []).map(p => p.text || '').join('');
    if (!text) throw new Error('empty answer — try clearer screenshots');
    importSpend(text);
  } catch(e){ toast('⚠ gemini: ' + e.message); }
}

function wireSpendImport(){
  $('#sp-shot')?.addEventListener('change', ev => { geminiSpend([...ev.target.files]); ev.target.value = ''; });

function copyText(t){
  const done = () => toast('copied — paste it to your ai ✕');
  if (navigator.clipboard?.writeText) navigator.clipboard.writeText(t).then(done).catch(() => fallbackCopy(t, done));
  else fallbackCopy(t, done);
}
function fallbackCopy(t, done){
  const ta = document.createElement('textarea');
  ta.value = t; ta.style.cssText = 'position:fixed;opacity:0;left:-9999px';
  document.body.appendChild(ta); ta.select();
  let okd = false;
  try { okd = document.execCommand('copy'); } catch(_){}
  ta.remove();
  if (okd) done();
  else openModal(`<h2>Copy the prompt</h2><div class="modal-sub">select all → copy, then take it to your ai</div>
    <textarea class="input" style="min-height:320px; font-family:'Space Mono',monospace; font-size:11px; background-image:none">${esc(t)}</textarea>`);
}

      ${s.navMode === 'favs' ? `<div class="mono small muted" style="margin-bottom:6px">★ = the four on the bar, the rest live behind "more"</div>` : ''}
      <div id="s-tabs">
        ${Object.keys(TABS).map(t => `
        <div class="tabrow">
          <span class="tki">${TAB_ICONS[t] || ''}</span>
          <span class="tn">${TABS[t].label}</span>
          ${s.navMode === 'favs' ? `<button class="fav ${s.favTabs.includes(t) ? 'on' : ''}" data-fav="${t}" ${s.tabs[t] === false ? 'disabled' : ''}>★</button>` : ''}
          <span class="tgl ${s.tabs[t] !== false ? 'on' : ''}" data-tgl="${t}"></span>
        </div>`).join('')}
      </div>
    </div>

    <div class="set-block">
      <div class="section-label"><span class="tag">health</span> goals</div>
      <div class="row"><input type="number" min="1000" step="500" class="input" id="s-goal" value="${s.stepGoal}" style="width:120px">
      <span class="mono small muted">steps / day</span>
      <input type="number" min="500" step="250" class="input" id="s-water" value="${s.waterGoal}" style="width:120px">
      <span class="mono small muted">ml water / day</span></div>
      <div class="tabrow" style="margin-top:6px"><span class="tn" style="font-size:13px">keep health controls minimal (sync only)</span><span class="tgl ${s.simpleHealth ? 'on' : ''}" id="s-simplehealth"></span></div>
    </div>

    <div class="set-block">
      <div class="section-label"><span class="tag">covers</span> optional api keys</div>
      <div class="field" style="margin-bottom:8px"><label>tmdb api key — better movie posters <span class="muted">(themoviedb.org → settings → api)</span></label>
        <input class="input mono" id="s-tmdb" value="${esc(s.tmdbKey)}" placeholder="leave empty to use itunes"></div>
      <div class="field" style="margin-bottom:8px"><label>rawg api key — optional extra game database <span class="muted">(rawg.io/apidocs)</span></label>
        <input class="input mono" id="s-rawg" value="${esc(s.rawgKey)}" placeholder="optional — steam + wikipedia work without it"></div>
      <div class="field"><label>gemini api key — auto-analyze bank screenshots in spend <span class="muted">(aistudio.google.com → get api key)</span></label>
        <input class="input mono" id="s-gemini" value="${esc(s.geminiKey || '')}" placeholder="optional — enables ⌁ auto-analyze"></div>
      <div class="mono small muted" style="margin-top:8px">no keys needed for tv, books, movies or games — tvmaze, open library, itunes, steam &amp; wikipedia are free.</div>
    </div>

    <div class="set-block">
      <div class="section-label"><span class="tag">data</span> local-first backup</div>
      <div class="row">
        <button class="btn" id="s-export">${ICONS.dl} export json</button>
        <label class="btn filelabel">${ICONS.ul} import json<input type="file" id="s-import" accept=".json,.txt,application/json,text/plain"></label>
        <button class="btn ghost" id="s-sample">✎ load sample data</button>
      </div>
      <div class="mono small muted" style="margin-top:8px">everything lives in this browser's storage for this file — export a backup now and then.</div>
    </div>

    ${NATIVE ? `
    <div class="set-block">
      <div class="section-label"><span class="tag">phone → desktop</span> sync folder</div>
      <div class="row">
        <button class="btn" id="s-folder">⌁ choose sync folder</button>
        <span class="mono small muted">${db.settings.syncFolder ? 'linked: ' + esc(db.settings.syncFolder) : 'not set'}</span>
      </div>
      <div class="mono small muted" style="margin-top:8px">pick a folder that syncs to your pc (google drive, syncthing…). mood writes <b>mood-steps.json</b> + <b>mood-backup.json</b> there after every change. on desktop: steps view → link sync file → mood-steps.json. full journal moves via settings → import of mood-backup.json.</div>
    </div>` : ''}

    <div class="set-block">
      <div class="section-label"><span class="tag" style="background:var(--bad)">danger</span> irreversible</div>
      <button class="btn danger" id="s-wipe">${ICONS.trash} erase everything</button>
    </div>

    <hr class="tear">
    <div class="row" style="justify-content:space-between">
      <span class="mono small muted">covers: tvmaze · open library · itunes · steam · wikipedia</span>
      <button class="btn primary" id="s-save">✕ save settings</button>
    </div>`);
  $('#s-export').addEventListener('click', exportJSON);
  $('#s-import').addEventListener('change', ev => { const f = ev.target.files[0]; if (f) importJSON(f); });
  $('#s-folder')?.addEventListener('click', () => { try { MoodNative.pickSyncFolder(); } catch(e){ toast('⚠ ' + e.message); } });
  $('#s-simplehealth')?.addEventListener('click', () => {
    db.settings.simpleHealth = !db.settings.simpleHealth; save(); openSettings();
  });
  $$('#s-patterns [data-pat]').forEach(c => c.addEventListener('click', () => {
    db.settings.pattern = c.dataset.pat; applyTheme(); save(); openSettings();
  }));
  $$('#modal-body [data-navm]').forEach(c => c.addEventListener('click', () => {
    db.settings.navMode = c.dataset.navm; applyTabs(); save(); openSettings();
  }));
  $$('#s-tabs [data-tgl]').forEach(tg => tg.addEventListener('click', () => {
    const t = tg.dataset.tgl;
    if (db.settings.tabs[t] !== false && enabledTabs().length <= 1){ toast('⚠ keep at least one tab on'); return; }
    db.settings.tabs[t] = db.settings.tabs[t] === false;
    db.settings.favTabs = db.settings.favTabs.filter(x => db.settings.tabs[x] !== false);
    applyTabs(); save(); openSettings();
  }));
  $$('#s-tabs [data-fav]').forEach(f => f.addEventListener('click', () => {
    const t = f.dataset.fav;
    if (db.settings.favTabs.includes(t)) db.settings.favTabs = db.settings.favTabs.filter(x => x !== t);
    else {
      if (db.settings.favTabs.length >= 4){ toast('⚠ four favorites max — unstar one first'); return; }
      db.settings.favTabs.push(t);
    }
    applyTabs(); save(); openSettings();
  }));
  $('#s-sample').addEventListener('click', () => { loadSample(); });
  $('#s-wipe').addEventListener('click', () => {
    if (!confirm('Erase ALL entries, steps and settings?')) return;
    if (!confirm('Really? There is no undo. Export a backup first?') ) return;
    db = DEFAULTS(); localStorage.removeItem(LS_KEY);
    applyTheme(); closeModal(); render(); toast('journal erased — fresh page');
  });
  $('#s-save').addEventListener('click', () => {
    db.settings.stepGoal = Math.max(500, +($('#s-goal').value || 8000));
    db.settings.waterGoal = Math.max(250, +($('#s-water').value || 2000));
    db.settings.tmdbKey = $('#s-tmdb').value.trim();
    db.settings.rawgKey = $('#s-rawg').value.trim();
    db.settings.geminiKey = $('#s-gemini').value.trim();
    save(); closeModal(); render(); toast('settings saved ✕');
  });
}

/* ============ sample data ============ */
function loadSample(){
  if (db.media.length && !confirm('Add sample entries alongside your existing data?')) return;
  const t = new Date();
  const ago = n => dateStr(addDays(t, -n));
  const mk = (o) => ({ id:uid(), creator:'', year:'', cover:'', color:pickColor(), status:'planned',
    startDate:'', endDate:'', rating:0, notes:'', pagesTotal:0, pagesRead:0, seasons:[], tvmazeId:null,
    runtimeMin:0, epMin:0, playHours:0, addedAt:todayStr(), ...o });
  db.media.push(
    mk({ type:'book', title:'The Name of the Wind', creator:'Patrick Rothfuss', year:'2007',
      cover:'https://covers.openlibrary.org/b/isbn/9780756404741-L.jpg',
      status:'active', startDate:ago(18), pagesTotal:662, pagesRead:310,
      notes:'Kvothe is insufferable and I can\'t stop reading. The framing device works.\nInn scenes = cozy.' }),
    mk({ type:'tv', title:'Severance', year:'2022', status:'active', startDate:ago(12), epMin:50,
      notes:'The waffle party episode broke me.',
      seasons:[
        { n:1, episodes:Array.from({length:9},(_,i)=>({ n:i+1, name:'Episode '+(i+1), watched:true })) },
        { n:2, episodes:Array.from({length:10},(_,i)=>({ n:i+1, name:'Episode '+(i+1), watched:i<4 })) },
      ]}),
    mk({ type:'movie', title:'Blade Runner 2049', creator:'Denis Villeneuve', year:'2017',
      status:'done', startDate:ago(9), endDate:ago(9), rating:5,
      notes:'Rewatch. Still the best-looking film of the decade. Sea wall fight!!' }),
    mk({ type:'game', title:'Hades II', creator:'Supergiant Games', year:'2024',
      status:'done', startDate:ago(49), endDate:ago(12), rating:4,
      notes:'Melinoë > Zagreus, fight me. Fear system is a great twist on heat.' }),
    mk({ type:'movie', title:'Stalker', creator:'Andrei Tarkovsky', year:'1979', status:'planned', runtimeMin:162,
      notes:'Everyone keeps telling me. Fine. It\'s on the list.' }),
    mk({ type:'book', title:'Piranesi', creator:'Susanna Clarke', year:'2020',
      cover:'https://covers.openlibrary.org/b/isbn/9781635575637-L.jpg', status:'planned', pagesTotal:245 }),
    mk({ type:'game', title:'Outer Wilds', creator:'Mobius Digital', year:'2019', status:'planned', playHours:22,
      notes:'Apparently unspoilable. Going in blind.' }),
  );
  db.media.filter(x => x.status === 'planned' && !db.queue.includes(x.id)).forEach(x => db.queue.push(x.id));
  // sample ledger (current month) + savings history
  const mk2 = (d, a, c) => ({ desc: d, amt: a, cat: c });
  db.spend[`${t.getFullYear()}-${pad2(t.getMonth()+1)}`] = db.spend[`${t.getFullYear()}-${pad2(t.getMonth()+1)}`] || {
    currency: '₺', importedAt: todayStr(),
    tx: [
      mk2('MIGROS SANAL MARKET', 1240.5, 'Groceries'), mk2('A101', 386, 'Groceries'), mk2('CARREFOURSA', 512, 'Groceries'),
      mk2('YEMEKSEPETI', 640, 'Dining Out'), mk2('KAHVE DUNYASI', 185, 'Dining Out'),
      mk2('ISTANBULKART', 300, 'Transport'), mk2('BITAKSI', 220, 'Transport'),
      mk2('SPOTIFY', 60, 'Subscriptions'), mk2('YOUTUBE PREMIUM', 80, 'Subscriptions'),
      mk2('TRENDYOL', 899, 'Shopping'), mk2('ECZANE', 145, 'Health'),
    ],
  };
  if (!db.savings.entries.length){
    const mAgo = n => { const d = new Date(t.getFullYear(), t.getMonth() - n, Math.min(t.getDate(), 28)); return dateStr(d); };
    db.savings.entries = [
      { date: mAgo(2), can: 30000, ila: 70000, canAdd: 0, ilaAdd: 0 },
      { date: mAgo(1), can: 40000, ila: 82000, canAdd: 7000, ilaAdd: 5000 },   // ~10% on 100k + top-ups
      { date: mAgo(0), can: 48600, ila: 94380, canAdd: 5000, ilaAdd: 5000 },   // ~9% on 122k + top-ups
    ];
  }
  const goal = db.settings.stepGoal || 8000;
  for (let i = 0; i < 45; i++){
    const ds = ago(i);
    if (db.health[ds]) continue;
    const seed = (i * 7919 + 137) % 9973;
    const steps = 3200 + (seed % 8800);
    const h = { steps, walkMin:0, walkKm:0 };
    if (seed % 4 === 0){ h.walkMin = 20 + (seed % 45); h.walkKm = Math.round(h.walkMin * 0.09 * 10) / 10; }
    db.health[ds] = h;
  }
  save(); closeModal(); render();
  toast('sample journal loaded ✕ — erase anytime in settings');
}

/* ============ init ============ */
function flushSave(){ try { localStorage.setItem(LS_KEY, JSON.stringify(db)); } catch(_){} }
window.addEventListener('beforeunload', flushSave);
document.addEventListener('visibilitychange', () => { if (document.hidden) flushSave(); });

$('#btn-settings').innerHTML = ICONS.gear;
$('#btn-settings').addEventListener('click', openSettings);
const TAB_ICONS = {
  library:ICONS.shelf, queue:ICONS.queue, calendar:ICONS.cal, health:ICONS.heart,
  habits:ICONS.chain, spend:ICONS.coin, projects:ICONS.clipboard, kitchen:ICONS.fork,
};
$$('.deck .key[data-view] .ki').forEach(s => { s.innerHTML = TAB_ICONS[s.parentElement.dataset.view] || ''; });
$('#btn-add .ki').innerHTML = ICONS.plus;
$('#btn-burger .ki').innerHTML = ICONS.burger;
applyTheme();
applyTabs();
render();
if (!NATIVE && 'showOpenFilePicker' in window && window.indexedDB) syncStepsFile(false); // desktop: silent steps refresh when a file is linked
if (NATIVE) setTimeout(() => {
  try { MoodNative.autoSync(); } catch(_){}
  scheduleReminders();                                          // re-arm pill/water alarms
  try { if (MoodNative.consumeShare) MoodNative.consumeShare(); } catch(_){}  // shared text/images arrive via onNativeShare
}, 600);
</script>
</body>
</html>
