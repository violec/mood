/* ---- Samsung Health / generic CSV import ---- */
function importHealthCSV(file){
  const r = new FileReader();
  r.onload = () => {
    try {
      const dates = applySteps(parseStepsText(String(r.result)));
      if (!dates.length){ toast('⚠ no step rows recognized in that file'); return; }
      save(); renderHealth();
      toast(`imported ${dates.length} days (${dates[0]} → ${dates[dates.length-1]}) ✕`);
    } catch(e){ toast('⚠ import failed: ' + e.message); }
  };
  r.readAsText(file);
}
function parseHealthCSV(text){
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  // find header row: has a date-ish and a step-ish column
  let hi = -1, cols = [];
  for (let i = 0; i < Math.min(lines.length, 5); i++){
    const c = lines[i].split(',').map(s => s.trim().toLowerCase());
    const hasDate = c.some(x => /day_time|start_time|update_time|date|^day$/.test(x));
    const hasSteps = c.some(x => /^count$|step_count|^steps?$/.test(x));
    if (hasDate && hasSteps){ hi = i; cols = c; break; }
  }
  if (hi === -1) throw new Error('no date/steps header found');
  const di = cols.findIndex(x => /day_time|^date$|^day$/.test(x)) !== -1
    ? cols.findIndex(x => /day_time|^date$|^day$/.test(x))
    : cols.findIndex(x => /start_time|date|day/.test(x));
  const si = cols.findIndex(x => /^count$|step_count|^steps?$/.test(x));
  const map = {};
  for (let i = hi + 1; i < lines.length; i++){
    const parts = lines[i].split(',');
    if (parts.length <= Math.max(di, si)) continue;
    const dRaw = (parts[di]||'').trim(), sRaw = (parts[si]||'').trim();
    const steps = parseInt(sRaw, 10);
    if (!steps || steps < 0) continue;
    let ds = null;
    if (/^\d{13,}$/.test(dRaw)) ds = dateStrUTC(new Date(+dRaw));
    else if (/^\d{10}$/.test(dRaw)) ds = dateStrUTC(new Date(+dRaw * 1000));
    else if (/^\d{4}-\d{2}-\d{2}/.test(dRaw)) ds = dRaw.slice(0,10);
    else { const p = new Date(dRaw); if (!isNaN(p)) ds = dateStr(p); }
    if (!ds) continue;
    map[ds] = Math.max(map[ds]||0, steps);
  }
  return map;
}
// samsung day_time is midnight UTC of the tracked day
const dateStrUTC = d => `${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())}`;

/* ---- steps text parser: csv or json ---- */
function parseStepsText(text){
  const s = String(text).trim();
  if (s[0] === '{' || s[0] === '['){
    const j = JSON.parse(s);
    const map = {}, extras = {};
    const put = (d, steps, wm, wk) => {
      if (d == null) return;
      const ds = String(d).slice(0, 10);
      if (!/^\d{4}-\d{2}-\d{2}$/.test(ds)) return;
      if (+steps > 0) map[ds] = Math.max(map[ds]||0, Math.round(+steps));
      if (+wm > 0 || +wk > 0) extras[ds] = { walkMin:+wm||0, walkKm:+wk||0 };
    };
    if (Array.isArray(j)) j.forEach(r => r && put(r.date ?? r.day ?? r.startTime, r.steps ?? r.count ?? r.step_count, r.walkMin ?? r.walk_min, r.walkKm ?? r.walk_km));
    else Object.entries(j).forEach(([k, v]) => (v && typeof v === 'object') ? put(k, v.steps ?? v.count, v.walkMin, v.walkKm) : put(k, v));
    return { map, extras };
  }
  return { map: parseHealthCSV(s), extras: {} };
}
function applySteps({ map, extras }){
  const dates = Object.keys(map);
  dates.forEach(d => { const prev = db.health[d] || {}; db.health[d] = { ...prev, steps: Math.max(prev.steps||0, map[d]) }; });
  Object.keys(extras).forEach(d => { db.health[d] = { ...(db.health[d]||{}), ...extras[d] }; });
  return dates.sort();
}

/* ---- linked auto-sync file (file system access api, chrome/edge) ----
   phone writes a csv/json into a synced folder (drive / syncthing) →
   mood re-reads the same file: silently on open, or via the sync key */
const idbKV = {
  _db: null,
  open(){ return new Promise((res, rej) => {
    if (idbKV._db) return res(idbKV._db);
    const r = indexedDB.open('mood-fs', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('kv');
    r.onsuccess = () => { idbKV._db = r.result; res(r.result); };
    r.onerror = () => rej(r.error);
  }); },
  async set(k, v){ const d = await idbKV.open(); return new Promise((res, rej) => { const t = d.transaction('kv','readwrite'); t.objectStore('kv').put(v, k); t.oncomplete = res; t.onerror = () => rej(t.error); }); },
  async get(k){ const d = await idbKV.open(); return new Promise((res, rej) => { const g = d.transaction('kv').objectStore('kv').get(k); g.onsuccess = () => res(g.result); g.onerror = () => rej(g.error); }); },
  async del(k){ const d = await idbKV.open(); return new Promise(res => { const t = d.transaction('kv','readwrite'); t.objectStore('kv').delete(k); t.oncomplete = res; }); },
};
async function linkStepsFile(){
  try {
    const [h] = await window.showOpenFilePicker({ types:[{ description:'steps csv / json', accept:{ 'text/csv':['.csv'], 'application/json':['.json'] } }] });
    await idbKV.set('stepsFile', h);
    db.settings.linkedName = h.name; save();
    await syncStepsFile(true);
  } catch(e){ if (e.name !== 'AbortError') toast('⚠ could not link: ' + e.message); }
}
async function unlinkStepsFile(){
  await idbKV.del('stepsFile');
  delete db.settings.linkedName; delete db.settings.lastSync;
  save(); renderHealth(); toast('sync file unlinked');
}
async function syncStepsFile(interactive){
  let h; try { h = await idbKV.get('stepsFile'); } catch(_){}
  if (!h){ if (interactive) toast('⚠ no file linked'); return; }
  try {
    let perm = await h.queryPermission({ mode:'read' });
    if (perm !== 'granted'){
      if (!interactive) return;               // silent startup attempt — never prompt
      perm = await h.requestPermission({ mode:'read' });
      if (perm !== 'granted'){ toast('⚠ read permission denied'); return; }
    }
    const file = await h.getFile();
    const dates = applySteps(parseStepsText(await file.text()));
    db.settings.lastSync = `${todayStr()} ${new Date().toTimeString().slice(0,5)}`;
    save();
    if (ui.view === 'health') renderHealth();
    toast(dates.length ? `synced ${dates.length} days from ${h.name} ✕` : 'synced — no step rows found');
  } catch(e){ if (interactive) toast('⚠ sync failed: ' + e.message); }
}
/* ============ queue — the "up next" thread ============ */
function inQueue(id){ return db.queue.includes(id); }
function syncQueueWithStatus(e){ if (e.status !== 'planned') db.queue = db.queue.filter(id => id !== e.id); }

function renderQueue(){
  const v = $('#view-queue');
  const items = db.queue.map(id => db.media.find(m => m.id === id)).filter(Boolean);
  if (items.length !== db.queue.length){ db.queue = items.map(e => e.id); save(); } // heal stale ids
  v.innerHTML = `
    <div class="section-label"><span class="tag">up next</span> ${items.length} queued — hold ⣿ and drag to reorder</div>
    <div class="queue-wrap">
      ${items.length
        ? `<div class="queue-thread" id="q-thread">${items.map((e,i) => qItemHTML(e,i)).join('')}</div>`
        : `<div class="empty-state"><span class="hand">the queue is empty…</span><span class="mono">log something as ○ planned and it lines up here</span></div>`}
    </div>`;
  $$('#q-thread .q-cover, #q-thread .q-info .t', v).forEach(el =>
    el.addEventListener('click', () => openDetail(el.closest('.q-item').dataset.id)));
  $$('[data-qact]', v).forEach(b => b.addEventListener('click', () => {
    const id = b.closest('.q-item').dataset.id;
    const e = db.media.find(m => m.id === id); if (!e) return;
    const act = b.dataset.qact;
    if (act === 'start'){ e.status = 'active'; e.startDate = e.startDate || todayStr(); syncQueueWithStatus(e); toast('▸ started — moved off the queue'); }
    if (act === 'done'){ e.status = 'done'; e.endDate = e.endDate || todayStr(); if (!e.startDate) e.startDate = e.endDate; syncQueueWithStatus(e); toast('✓ finished ✕'); }
    if (act === 'rm'){ db.queue = db.queue.filter(x => x !== id); toast('removed from queue'); }
    save(); renderQueue();
  }));
  wireQueueDrag($('#q-thread'));
}

function qItemHTML(e, i){
  const t = TYPES[e.type];
  return `<div class="q-item" data-id="${e.id}">
    <div class="q-handle" title="drag to reorder">⣿</div>
    <div class="q-no">${pad2(i+1)}</div>
    <div class="q-cover">${e.cover ? `<img src="${esc(e.cover)}" loading="lazy" onerror="imgFb(this)">` : `<div class="ph">${t.icon}</div>`}</div>
    <div class="q-info">
      <div class="t">${esc(e.title)}</div>
      <div class="s">${t.label}${e.year ? ' · ' + esc(e.year) : ''}${e.creator ? ' · ' + esc(e.creator) : ''}</div>
      <div class="q-actions">
        <button class="btn" data-qact="start">▸ start</button>
        <button class="btn" data-qact="done">✓ done</button>
        <button class="btn ghost" data-qact="rm">– remove</button>
      </div>
    </div>
  </div>`;
}

function wireQueueDrag(container){
  if (!container) return;
  let dragEl = null;
  $$('.q-handle', container).forEach(h => {
    h.addEventListener('pointerdown', ev => {
      dragEl = h.closest('.q-item');
      dragEl.classList.add('dragging');
      h.setPointerCapture(ev.pointerId);
      ev.preventDefault();
    });
    h.addEventListener('pointermove', ev => {
      if (!dragEl) return;
      const others = $$('.q-item:not(.dragging)', container);
      const next = others.find(it => { const r = it.getBoundingClientRect(); return ev.clientY < r.top + r.height/2; });
      if (next) container.insertBefore(dragEl, next); else container.appendChild(dragEl);
    });
    const drop = () => {
      if (!dragEl) return;
      dragEl.classList.remove('dragging'); dragEl = null;
      db.queue = $$('.q-item', container).map(x => x.dataset.id);
      save(); renderQueue();
    };
    h.addEventListener('pointerup', drop);
    h.addEventListener('pointercancel', drop);
  });
}

/* ============ spend — llm ledger ============ */
const SPEND_PROMPT = `You are a personal finance analyst. Analyze the bank statement I paste below.

Rules:
- Categorize every OUTGOING expense into 6-10 clear categories (examples: Rent & Bills, Groceries, Dining Out, Transport, Subscriptions, Health, Shopping, Entertainment, Other).
- Sum the total per category.
- Ignore income, refunds, and transfers between my own accounts.
- Add a short one-line "note" per category naming the main merchants or one insight.
- Use the statement's currency symbol for "currency".

Reply with ONLY this JSON — no markdown fences, no commentary:
{"month":"MONTH_KEY","currency":"$","categories":[{"name":"Groceries","amount":0,"note":"..."}]}

My statement:
<<< paste your bank statement here >>>`;

function spendKey(){ const { y, m } = ui.spend; return `${y}-${pad2(m+1)}`; }

function parseSpendText(text){
  let s = String(text).trim().replace(/^```[a-z]*\s*/i, '').replace(/```\s*$/, '').trim();
  let month = null, currency = '', cats = [];
  let j = null; try { j = JSON.parse(s); } catch(_){}
  if (j){
    if (Array.isArray(j)) cats = j;
    else if (typeof j === 'object'){
      if (/^\d{4}-\d{2}/.test(String(j.month || ''))) month = String(j.month).slice(0,7);
      currency = String(j.currency || '');
      if (Array.isArray(j.categories)) cats = j.categories;
      else cats = Object.entries(j).filter(([,v]) => typeof v === 'number').map(([name, amount]) => ({ name, amount }));
    }
    cats = cats.map(c => ({
      name: String(c.name ?? c.category ?? '').trim(),
      amount: +(c.amount ?? c.total ?? c.sum ?? 0),
      note: String(c.note ?? c.insight ?? ''),
    }));
  } else {
    // plain lines: "Food, 420" | "Food: 420.50" | "| Food | 420 |"
    s.split(/\r?\n/).forEach(line => {
      const m = line.match(/^\|?\s*([^|,:;\t]+?)\s*[|,:;\t]+\s*[₺$€£]?\s*([\d.,]+)\s*\|?\s*$/);
      if (!m) return;
      const name = m[1].trim();
      if (!name || /^(category|categories|name|total|sum|amount)$/i.test(name)) return;
      let n = m[2];
      if (n.includes(',') && n.includes('.')) n = n.lastIndexOf(',') > n.lastIndexOf('.') ? n.replace(/\./g,'').replace(',', '.') : n.replace(/,/g, '');
      else if (n.includes(',')) n = /,\d{1,2}$/.test(n) ? n.replace(',', '.') : n.replace(/,/g, '');
      const amount = parseFloat(n);
      if (amount > 0) cats.push({ name, amount, note: '' });
    });
    const cur = s.match(/[₺$€£]/); currency = cur ? cur[0] : '';
  }
  cats = cats.filter(c => c.name && c.amount > 0);
  if (!cats.length) throw new Error('no categories recognized — expected the json from the prompt, or "category, amount" lines');
  return { month, currency, categories: cats };
}

function importSpend(text){
  try {
    const p = parseSpendText(text);
    if (p.month){ const [yy, mm] = p.month.split('-').map(Number); ui.spend = { y: yy, m: mm - 1 }; }
    const key = p.month || spendKey();
    db.spend[key] = { currency: p.currency || db.spend[key]?.currency || '', categories: p.categories, importedAt: todayStr() };
    save(); renderSpend();
    toast(`ledger stamped — ${p.categories.length} categories ✕`);
  } catch(e){ toast('⚠ ' + e.message); }
}

function donutSVG(cats, currency, total){
  const R = 70, C = 2 * Math.PI * R;
  let off = 0;
  const segs = cats.map((c, i) => {
    const frac = c.amount / total;
    const seg = `<circle r="${R}" cx="100" cy="100" fill="none" stroke="${PALETTE[i % PALETTE.length]}" stroke-width="32"
      stroke-dasharray="${Math.max(frac * C - 1.5, .8).toFixed(2)} ${C.toFixed(2)}" stroke-dashoffset="${(-off * C).toFixed(2)}"
      transform="rotate(-90 100 100)"><title>${esc(c.name)} — ${(frac*100).toFixed(0)}%</title></circle>`;
    off += frac;
    return seg;
  }).join('');
  return `<svg viewBox="0 0 200 200" style="max-width:260px; width:100%">
    <circle r="${R}" cx="100" cy="100" fill="none" stroke="var(--bg-lo)" stroke-width="32"/>
    ${segs}
    <circle r="51" cx="100" cy="100" fill="var(--bg-hi)" stroke="var(--line)"/>
    <text x="100" y="97" text-anchor="middle" style="font-family:'Libre Caslon Text',Georgia,serif; font-weight:700; font-size:20px" fill="var(--ink)">${esc(currency)}${fmtNum(Math.round(total))}</text>
    <text x="100" y="114" text-anchor="middle" style="font-family:'Space Mono',monospace; font-size:8px; letter-spacing:2px" fill="var(--ink-3)">TOTAL SPENT</text>
  </svg>`;
}

function renderSpend(){
  const v = $('#view-spend');
  const { y, m } = ui.spend;
  const key = spendKey();
  const data = db.spend[key];
  const daysIn = new Date(y, m + 1, 0).getDate();
  let body;
  if (data && data.categories?.length){
    const cats = data.categories.slice().sort((a, b) => b.amount - a.amount);
    const total = cats.reduce((a, c) => a + c.amount, 0);
    const cur = data.currency || '';
    body = `
      <div class="panel screws spend-grid">
        <div class="donut-wrap">
          ${donutSVG(cats, cur, total)}
          <div class="mono small muted">imported ${esc(data.importedAt || '')} · ${cats.length} categories</div>
        </div>
        <div>
          <div class="stat-row" style="margin-bottom:12px">
            <div class="stat inset"><div class="v">${esc(cur)}${fmtNum(Math.round(total))}</div><div class="k">total</div></div>
            <div class="stat inset"><div class="v">${esc(cur)}${fmtNum(Math.round(total / daysIn))}</div><div class="k">per day</div></div>
            <div class="stat inset"><div class="v">${Math.round(cats[0].amount / total * 100)}%</div><div class="k">${esc(cats[0].name.slice(0, 14))}</div></div>
          </div>
          ${cats.map((c, i) => `
          <div class="sp-row">

/* gemini auto-analyze: bank screenshot(s) → categorized json → ledger */
async function geminiSpend(files){
  const key = db.settings.geminiKey;
  if (!key){ toast('⚠ add a gemini api key in settings first'); return; }
  if (!files.length) return;
  toast('⌁ gemini is reading the statement…');
  try {
    const parts = [{ text: SPEND_PROMPT
      .replace('MONTH_KEY', spendKey())
      .replace('My statement:\n<<< paste your bank statement here >>>', 'My statement is in the attached screenshot(s). If the statement shows a different month than the one in "month", use the month visible in the statement.') }];
    for (const f of files){
      const b64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(String(r.result).split(',')[1]);
        r.onerror = () => rej(new Error('could not read image'));
        r.readAsDataURL(f);
      });
      parts.push({ inline_data: { mime_type: f.type || 'image/png', data: b64 } });
    }
    const body = JSON.stringify({ contents: [{ parts }], generationConfig: { response_mime_type: 'application/json', temperature: 0.1 } });
    let resp = null, lastErr = null;
    for (const model of ['gemini-2.5-flash', 'gemini-2.0-flash']){
      try {
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`,
          { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
        if (r.status === 404){ lastErr = new Error('model not found'); continue; }
        if (!r.ok){ const err = await r.json().catch(() => null); throw new Error(err?.error?.message || 'HTTP ' + r.status); }
        resp = await r.json(); break;
      } catch(e){ lastErr = e; }
    }
    if (!resp) throw lastErr || new Error('no response');
    const text = (resp.candidates?.[0]?.content?.parts || []).map(p => p.text || '').join('');
    if (!text) throw new Error('empty answer — try clearer screenshots');
    importSpend(text);
  } catch(e){ toast('⚠ gemini: ' + e.message); }
}

function wireSpendImport(){
  $('#sp-shot')?.addEventListener('change', ev => { geminiSpend([...ev.target.files]); ev.target.value = ''; });
  $('#sp-prompt')?.addEventListener('click', () => copyText(SPEND_PROMPT.replace('MONTH_KEY', spendKey())));
  $('#sp-go')?.addEventListener('click', () => { const t = $('#sp-paste')?.value || ''; if (t.trim()) importSpend(t); else toast('⚠ paste the ai output first'); });
  $('#sp-file')?.addEventListener('change', ev => {
    const f = ev.target.files[0]; if (!f) return;
    const r = new FileReader(); r.onload = () => importSpend(String(r.result)); r.readAsText(f);
    ev.target.value = '';
  });
}

function copyText(t){
  const done = () => toast('copied — paste it to your ai ✕');
  if (navigator.clipboard?.writeText) navigator.clipboard.writeText(t).then(done).catch(() => fallbackCopy(t, done));
  else fallbackCopy(t, done);
}
function fallbackCopy(t, done){
  const ta = document.createElement('textarea');
  ta.value = t; ta.style.cssText = 'position:fixed;opacity:0;left:-9999px';
  document.body.appendChild(ta); ta.select();
  let okd = false;
  try { okd = document.execCommand('copy'); } catch(_){}
  ta.remove();
  if (okd) done();
  else openModal(`<h2>Copy the prompt</h2><div class="modal-sub">select all → copy, then take it to your ai</div>
    <textarea class="input" style="min-height:320px; font-family:'Space Mono',monospace; font-size:11px; background-image:none">${esc(t)}</textarea>`);
}

/* ============ android native bridge (mood apk) ============
   the mood android app exposes window.MoodNative:
     autoSync()                — silent health connect read if permitted
     requestSteps(days)        — read (asks permission if needed) → onNativeSteps(json)
     pickSyncFolder()          — SAF folder picker → onNativeFolder(name)
     writeSyncFile(name, txt)  — write into the chosen folder
   phone → desktop: mood writes mood-steps.json + mood-backup.json into a
   drive/syncthing folder; desktop mood links mood-steps.json in the steps view. */
const NATIVE = typeof window.MoodNative !== 'undefined';
var nativeExport = debounce(() => {
  if (!NATIVE || !db.settings.syncFolder) return;
  try {
    MoodNative.writeSyncFile('mood-steps.json', JSON.stringify(db.health));
    MoodNative.writeSyncFile('mood-backup.json', JSON.stringify(db));
  } catch(_){}
}, 2500);
window.onNativeSteps = function(json){
  try {
    const dates = applySteps(parseStepsText(json));
    if (dates.length){
      save();
      if (ui.view === 'health') renderHealth();
      toast(`⌁ health connect — ${dates.length} days synced ✕`);
    }
    nativeExport();
  } catch(e){ toast('⚠ health sync failed: ' + e.message); }
};
window.onNativeFolder = function(name){
  db.settings.syncFolder = name || '';
  save(); nativeExport();
  if ($('#s-folder')) { closeModal(); openSettings(); }
  toast(name ? `sync folder linked: ${name} ✕` : 'sync folder cleared');
};
window.onNativeError = function(msg){ toast('⚠ ' + msg); };

function loadSample(){
  if (db.media.length && !confirm('Add sample entries alongside your existing data?')) return;
  const t = new Date();
  const ago = n => dateStr(addDays(t, -n));
  const mk = (o) => ({ id:uid(), creator:'', year:'', cover:'', color:pickColor(), status:'planned',
    startDate:'', endDate:'', rating:0, notes:'', pagesTotal:0, pagesRead:0, seasons:[], tvmazeId:null, addedAt:todayStr(), ...o });
  db.media.push(
    mk({ type:'book', title:'The Name of the Wind', creator:'Patrick Rothfuss', year:'2007',
      cover:'https://covers.openlibrary.org/b/isbn/9780756404741-L.jpg',
      status:'active', startDate:ago(18), pagesTotal:662, pagesRead:310,
      notes:'Kvothe is insufferable and I can\'t stop reading. The framing device works.\nInn scenes = cozy.' }),
    mk({ type:'tv', title:'Severance', year:'2022', status:'active', startDate:ago(12),
      notes:'The waffle party episode broke me.',
      seasons:[
        { n:1, episodes:Array.from({length:9},(_,i)=>({ n:i+1, name:'Episode '+(i+1), watched:true })) },
        { n:2, episodes:Array.from({length:10},(_,i)=>({ n:i+1, name:'Episode '+(i+1), watched:i<4 })) },
      ]}),
    mk({ type:'movie', title:'Blade Runner 2049', creator:'Denis Villeneuve', year:'2017',
      status:'done', startDate:ago(9), endDate:ago(9), rating:5,
      notes:'Rewatch. Still the best-looking film of the decade. Sea wall fight!!' }),
    mk({ type:'game', title:'Hades II', creator:'Supergiant Games', year:'2024',
      status:'done', startDate:ago(49), endDate:ago(12), rating:4,
      notes:'Melinoë > Zagreus, fight me. Fear system is a great twist on heat.' }),
    mk({ type:'movie', title:'Stalker', creator:'Andrei Tarkovsky', year:'1979', status:'planned',
      notes:'Everyone keeps telling me. Fine. It\'s on the list.' }),
    mk({ type:'book', title:'Piranesi', creator:'Susanna Clarke', year:'2020',
      cover:'https://covers.openlibrary.org/b/isbn/9781635575637-L.jpg', status:'planned', pagesTotal:245 }),
    mk({ type:'game', title:'Outer Wilds', creator:'Mobius Digital', year:'2019', status:'planned',
      notes:'Apparently unspoilable. Going in blind.' }),
  );
  db.media.filter(x => x.status === 'planned' && !db.queue.includes(x.id)).forEach(x => db.queue.push(x.id));
  const goal = db.settings.stepGoal || 8000;
  for (let i = 0; i < 45; i++){
    const ds = ago(i);
    if (db.health[ds]) continue;
    const seed = (i * 7919 + 137) % 9973;
    const steps = 3200 + (seed % 8800);
    const h = { steps, walkMin:0, walkKm:0 };
    if (seed % 4 === 0){ h.walkMin = 20 + (seed % 45); h.walkKm = Math.round(h.walkMin * 0.09 * 10) / 10; }
    db.health[ds] = h;
  }
  save(); closeModal(); render();
  toast('sample journal loaded ✕ — erase anytime in settings');
}
